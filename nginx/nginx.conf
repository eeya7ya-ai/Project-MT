worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    upstream api {
        server api:8000;
    }

    upstream admin_web {
        server admin_web:80;
    }

    upstream technician_web {
        server technician_web:80;
    }

    server {
        listen 80;
        server_name _;

        # API
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API Docs
        location /docs {
            proxy_pass http://api;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://api;
            proxy_set_header Host $host;
        }

        location /health {
            proxy_pass http://api;
        }

        # Admin Web App  →  http://your-server/admin/
        location /admin/ {
            proxy_pass http://admin_web/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Technician Web App  →  http://your-server/tech/
        location /tech/ {
            proxy_pass http://technician_web/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Default: redirect to admin
        location = / {
            return 302 /admin/;
        }
    }
}

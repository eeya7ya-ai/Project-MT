name: technician_app
description: Project-MT Technician Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.4.3+1

  # Navigation
  go_router: ^13.2.0

  # Local DB (offline cache)
  sqflite: ^2.3.2
  path: ^1.9.0

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  image_picker: ^1.1.1
  signature: ^5.4.1
  intl: ^0.19.0
  fl_chart: ^0.67.0

  # Connectivity
  connectivity_plus: ^6.0.3

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Utils
  uuid: ^4.4.0
  logger: ^2.3.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

name: admin_app
description: Project-MT Admin & Office Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP
  dio: ^5.4.3+1
  retrofit: ^4.1.0

  # Navigation
  go_router: ^13.2.0

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  fl_chart: ^0.67.0
  data_table_2: ^2.5.12
  file_picker: ^8.0.0+1
  image_picker: ^1.1.1
  intl: ^0.20.2

  # Excel / files
  excel: ^4.0.2
  open_filex: ^4.3.4

  # Utils
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  logger: ^2.3.0
  equatable: ^2.0.5
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  retrofit_generator: ^8.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
